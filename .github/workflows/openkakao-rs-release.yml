name: openkakao-rs Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master

      - name: Cargo fmt
        run: cargo fmt --manifest-path openkakao-rs/Cargo.toml --check

      - name: Cargo clippy
        run: cargo clippy --manifest-path openkakao-rs/Cargo.toml -- -D warnings

      - name: Cargo test
        run: cargo test --manifest-path openkakao-rs/Cargo.toml

  build-aarch64:
    runs-on: macos-14
    needs: verify
    env:
      TARGET: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master

      - name: Build
        run: cargo build --release --target "$TARGET" --manifest-path openkakao-rs/Cargo.toml

      - name: Package artifact
        run: |
          ASSET="openkakao-rs-${TARGET}.tar.gz"
          tar -C "openkakao-rs/target/${TARGET}/release" -czf "$ASSET" openkakao-rs
          shasum -a 256 "$ASSET" > "$ASSET.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openkakao-rs-${{ env.TARGET }}
          path: |
            openkakao-rs-${{ env.TARGET }}.tar.gz
            openkakao-rs-${{ env.TARGET }}.tar.gz.sha256

  build-x86_64:
    runs-on: macos-15-intel
    needs: verify
    env:
      TARGET: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master

      - name: Build
        run: cargo build --release --target "$TARGET" --manifest-path openkakao-rs/Cargo.toml

      - name: Package artifact
        run: |
          ASSET="openkakao-rs-${TARGET}.tar.gz"
          tar -C "openkakao-rs/target/${TARGET}/release" -czf "$ASSET" openkakao-rs
          shasum -a 256 "$ASSET" > "$ASSET.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openkakao-rs-${{ env.TARGET }}
          path: |
            openkakao-rs-${{ env.TARGET }}.tar.gz
            openkakao-rs-${{ env.TARGET }}.tar.gz.sha256

  release:
    runs-on: ubuntu-latest
    needs: [build-aarch64, build-x86_64]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/openkakao-rs-aarch64-apple-darwin.tar.gz
            dist/openkakao-rs-aarch64-apple-darwin.tar.gz.sha256
            dist/openkakao-rs-x86_64-apple-darwin.tar.gz
            dist/openkakao-rs-x86_64-apple-darwin.tar.gz.sha256

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Fetch Homebrew token
        id: doppler
        run: |
          set -euo pipefail
          TOKEN=$(doppler secrets get HOMEBREW_TAP_TOKEN --plain 2>/dev/null)
          if [ -z "$TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN not found in Doppler"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "HOMEBREW_TAP_TOKEN=$TOKEN" >> "$GITHUB_OUTPUT"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARM_SHA=$(awk '{print $1}' dist/openkakao-rs-aarch64-apple-darwin.tar.gz.sha256)
          X86_SHA=$(awk '{print $1}' dist/openkakao-rs-x86_64-apple-darwin.tar.gz.sha256)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "arm_sha=$ARM_SHA" >> "$GITHUB_OUTPUT"
          echo "x86_sha=$X86_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: JungHoonGhae/homebrew-openkakao
          token: ${{ steps.doppler.outputs.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          ARM_SHA: ${{ steps.meta.outputs.arm_sha }}
          X86_SHA: ${{ steps.meta.outputs.x86_sha }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p tap/Formula
          cat > tap/Formula/openkakao-rs.rb <<FORMULA
          class OpenkakaoRs < Formula
            desc "Rust rewrite of OpenKakao CLI"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${TAG}/openkakao-rs-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM_SHA}"
              else
                url "https://github.com/${REPO}/releases/download/${TAG}/openkakao-rs-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_SHA}"
              end
            end

            def install
              bin.install "openkakao-rs"
            end

            test do
              assert_match "openkakao-rs", shell_output("#{bin}/openkakao-rs --help")
            end
          end
          FORMULA

      - name: Commit and push formula update
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/openkakao-rs.rb
          if git diff --cached --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi
          git commit -m "chore: update openkakao-rs ${VERSION}"
          git push
